<!DOCTYPE html>
<html>
<head>
  <title>Whitespace Scaffold + runChartDownsample Prototype</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; margin: 20px; }
    h1 { color: #4ec9b0; }
    h2 { color: #9cdcfe; margin-top: 30px; }
    .section { margin: 20px 0; border: 1px solid #444; padding: 15px; }
    .chart-row { display: flex; gap: 20px; margin: 10px 0; }
    .chart-box { flex: 1; }
    .chart-box label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
    .chart-container { width: 100%; height: 300px; }
    .controls { margin: 10px 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .controls button { background: #333; color: #d4d4d4; border: 1px solid #666; padding: 6px 12px; cursor: pointer; font-family: monospace; }
    .controls button:hover { background: #444; }
    .controls button.active { background: #264f78; border-color: #4ec9b0; }
    .controls select, .controls input { background: #333; color: #d4d4d4; border: 1px solid #666; padding: 4px 8px; font-family: monospace; }
    .log { padding: 8px; margin: 5px 0; border-left: 3px solid #666; white-space: pre; font-size: 12px; color: #aaa; }
    .log.good { border-left-color: #4ec9b0; }
    .log.warn { border-left-color: #e8a838; }
    .log.bad { border-left-color: #f44; }
    .perf-table { border-collapse: collapse; font-size: 12px; margin: 10px 0; }
    .perf-table th, .perf-table td { border: 1px solid #444; padding: 4px 8px; text-align: right; }
    .perf-table th { color: #4ec9b0; }
    #status { position: fixed; top: 5px; right: 10px; font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <h1>runChartDownsample + Whitespace Scaffold Prototype</h1>
  <p>Simulates LTTB-downsampled data (sparse head/tail, dense center) with a hidden
     whitespace series providing proportional time axis spacing.</p>
  <div id="status"></div>
  <div id="experiments"></div>

  <script type="module">
    import {
      createChart,
      LineSeries,
      AreaSeries,
    } from 'https://unpkg.com/lightweight-charts@5.0.5/dist/lightweight-charts.standalone.production.mjs';

    const root = document.getElementById('experiments');

    // ========================================================================
    // DATA GENERATION UTILITIES
    // ========================================================================

    // Generate a realistic price series (1 year, 1-second resolution = ~31.5M points conceptually)
    // We generate at "full resolution" for a given range, then LTTB-downsample it
    const FULL_RANGE_START = 1704067200; // 2024-01-01 00:00:00 UTC
    const FULL_RANGE_END   = 1735689600; // 2025-01-01 00:00:00 UTC
    const FULL_DURATION    = FULL_RANGE_END - FULL_RANGE_START;

    function generateFullResData(from, to, intervalSec = 60) {
      // Simulate 1-minute candles across the range
      const points = [];
      let price = 100;
      for (let t = from; t <= to; t += intervalSec) {
        price += (Math.random() - 0.498) * 0.5; // slight upward drift
        price = Math.max(10, price);
        points.push({ time: t, value: Math.round(price * 100) / 100 });
      }
      return points;
    }

    // LTTB (Largest Triangle Three Buckets) downsample - mimics runChartDownsample
    function lttbDownsample(data, targetPoints) {
      if (data.length <= targetPoints) return data.slice();
      const result = [data[0]]; // always keep first
      const bucketSize = (data.length - 2) / (targetPoints - 2);

      for (let i = 1; i < targetPoints - 1; i++) {
        const avgStart = Math.floor((i + 1) * bucketSize) + 1;
        const avgEnd = Math.min(Math.floor((i + 2) * bucketSize) + 1, data.length - 1);

        // Average of next bucket (for triangle calculation)
        let avgX = 0, avgY = 0;
        const avgCount = avgEnd - avgStart;
        for (let j = avgStart; j < avgEnd; j++) {
          avgX += data[j].time;
          avgY += data[j].value;
        }
        avgX /= avgCount;
        avgY /= avgCount;

        // Current bucket range
        const rangeStart = Math.floor(i * bucketSize) + 1;
        const rangeEnd = Math.min(Math.floor((i + 1) * bucketSize) + 1, data.length - 1);

        // Pick point with largest triangle area
        const prevPoint = result[result.length - 1];
        let maxArea = -1;
        let maxIdx = rangeStart;
        for (let j = rangeStart; j < rangeEnd; j++) {
          const area = Math.abs(
            (prevPoint.time - avgX) * (data[j].value - prevPoint.value) -
            (prevPoint.time - data[j].time) * (avgY - prevPoint.value)
          );
          if (area > maxArea) {
            maxArea = area;
            maxIdx = j;
          }
        }
        result.push(data[maxIdx]);
      }
      result.push(data[data.length - 1]); // always keep last
      return result;
    }

    // Simulate what runChartDownsample returns when given a zoomed range:
    // Dense points inside the range, sparse head/tail outside
    function simulateDownsample(fullData, viewFrom, viewTo, width) {
      // Split data into head, body, tail
      const head = fullData.filter(p => p.time < viewFrom);
      const body = fullData.filter(p => p.time >= viewFrom && p.time <= viewTo);
      const tail = fullData.filter(p => p.time > viewTo);

      // LTTB keeps ~width points total, distributed by density
      // In practice, runChartDownsample gives most points to the visible range
      // and sparse coverage to head/tail
      const headBudget = Math.max(2, Math.round(width * 0.03));  // ~3% for head
      const tailBudget = Math.max(2, Math.round(width * 0.03));  // ~3% for tail
      const bodyBudget = width - headBudget - tailBudget;

      const dsHead = lttbDownsample(head, headBudget);
      const dsBody = lttbDownsample(body, bodyBudget);
      const dsTail = lttbDownsample(tail, tailBudget);

      return [...dsHead, ...dsBody, ...dsTail];
    }

    // Generate evenly-spaced whitespace grid
    function generateWhitespaceGrid(from, to, count) {
      const step = (to - from) / (count - 1);
      const ws = [];
      for (let i = 0; i < count; i++) {
        ws.push({ time: Math.round(from + i * step) });
      }
      return ws;
    }

    // Time setData call
    function timedSetData(series, data) {
      const t0 = performance.now();
      series.setData(data);
      const elapsed = performance.now() - t0;
      return elapsed;
    }

    // Deduplicate by time (keep last value per time)
    function dedup(data) {
      const map = new Map();
      for (const p of data) {
        map.set(p.time, p);
      }
      return Array.from(map.values()).sort((a, b) => a.time - b.time);
    }

    function makeChart(container, opts = {}) {
      return createChart(container, {
        width: container.clientWidth || 800,
        height: 300,
        layout: { background: { color: '#1e1e1e' }, textColor: '#d4d4d4' },
        timeScale: {
          timeVisible: true,
          minBarSpacing: 0.001,
          ...opts.timeScale,
        },
        rightPriceScale: { borderVisible: false },
        grid: {
          vertLines: { color: '#2a2a2a' },
          horzLines: { color: '#2a2a2a' },
        },
        ...opts,
      });
    }

    function addLog(parent, text, level = '') {
      const div = document.createElement('div');
      div.className = `log ${level}`;
      div.textContent = text;
      parent.appendChild(div);
      return div;
    }

    // ========================================================================
    // Generate the base dataset once (100K 1-minute points = ~69 days)
    // ========================================================================
    const status = document.getElementById('status');
    status.textContent = 'Generating data...';
    const BASE_DATA = generateFullResData(FULL_RANGE_START, FULL_RANGE_START + 69 * 86400, 60);
    const DATA_END = BASE_DATA[BASE_DATA.length - 1].time;
    status.textContent = `Base data: ${BASE_DATA.length.toLocaleString()} points (${Math.round((DATA_END - FULL_RANGE_START) / 86400)} days)`;

    // ========================================================================
    // EXPERIMENT 1: Side-by-side — no scaffold vs scaffold (full zoom out)
    // ========================================================================
    {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = '<h2>1. Full zoom-out: No scaffold vs. whitespace scaffold</h2>' +
        '<p>Both charts show ~800 LTTB-downsampled points from 100K. ' +
        'Left: raw data only (ordinal spacing). Right: + 2000 whitespace scaffold points (proportional time).</p>';
      root.appendChild(section);

      const row = document.createElement('div');
      row.className = 'chart-row';
      section.appendChild(row);

      // Chart A: No scaffold
      const boxA = document.createElement('div');
      boxA.className = 'chart-box';
      boxA.innerHTML = '<label>A: No scaffold (ordinal spacing)</label>';
      const contA = document.createElement('div');
      contA.className = 'chart-container';
      boxA.appendChild(contA);
      row.appendChild(boxA);

      // Chart B: With scaffold
      const boxB = document.createElement('div');
      boxB.className = 'chart-box';
      boxB.innerHTML = '<label>B: Whitespace scaffold (proportional time)</label>';
      const contB = document.createElement('div');
      contB.className = 'chart-container';
      boxB.appendChild(contB);
      row.appendChild(boxB);

      setTimeout(() => {
        const dsData = lttbDownsample(BASE_DATA, 800);

        // Chart A
        const chartA = makeChart(contA);
        const seriesA = chartA.addSeries(LineSeries, { color: '#4ec9b0', lineWidth: 1 });
        const tA = timedSetData(seriesA, dsData);
        chartA.timeScale().fitContent();

        // Chart B
        const chartB = makeChart(contB);
        const scaffoldB = chartB.addSeries(LineSeries, { visible: false });
        const wsData = generateWhitespaceGrid(FULL_RANGE_START, DATA_END, 1000);
        const tWs = timedSetData(scaffoldB, wsData);
        const seriesB = chartB.addSeries(LineSeries, { color: '#4ec9b0', lineWidth: 1 });
        const tB = timedSetData(seriesB, dsData);
        chartB.timeScale().fitContent();

        addLog(section,
          `Chart A: ${dsData.length} data points, setData: ${tA.toFixed(1)}ms\n` +
          `Chart B: ${dsData.length} data + ${wsData.length} whitespace, setData: data=${tB.toFixed(1)}ms ws=${tWs.toFixed(1)}ms\n` +
          `Both charts show the same LTTB-downsampled data. Compare x-axis spacing.`,
          'good'
        );
      }, 100);
    }

    // ========================================================================
    // EXPERIMENT 2: Simulated zoom — sparse head/tail behavior
    // ========================================================================
    {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = '<h2>2. Zoomed view: sparse head/tail from runChartDownsample</h2>' +
        '<p>Simulates zooming into days 20-30 of 69 days. runChartDownsample returns dense data ' +
        'for the visible range and sparse head/tail for context. The scaffold keeps spacing proportional.</p>';
      root.appendChild(section);

      const row = document.createElement('div');
      row.className = 'chart-row';
      section.appendChild(row);

      const boxA = document.createElement('div');
      boxA.className = 'chart-box';
      boxA.innerHTML = '<label>A: Sparse head/tail, no scaffold</label>';
      const contA = document.createElement('div');
      contA.className = 'chart-container';
      boxA.appendChild(contA);
      row.appendChild(boxA);

      const boxB = document.createElement('div');
      boxB.className = 'chart-box';
      boxB.innerHTML = '<label>B: Sparse head/tail + whitespace scaffold</label>';
      const contB = document.createElement('div');
      contB.className = 'chart-container';
      boxB.appendChild(contB);
      row.appendChild(boxB);

      setTimeout(() => {
        const viewFrom = FULL_RANGE_START + 20 * 86400;
        const viewTo = FULL_RANGE_START + 30 * 86400;
        const dsData = simulateDownsample(BASE_DATA, viewFrom, viewTo, 800);

        // Chart A
        const chartA = makeChart(contA);
        const seriesA = chartA.addSeries(LineSeries, { color: '#e8a838', lineWidth: 1 });
        timedSetData(seriesA, dsData);
        chartA.timeScale().fitContent();

        // Chart B
        const chartB = makeChart(contB);
        const scaffoldB = chartB.addSeries(LineSeries, { visible: false });
        const wsData = generateWhitespaceGrid(FULL_RANGE_START, DATA_END, 1000);
        timedSetData(scaffoldB, wsData);
        const seriesB = chartB.addSeries(LineSeries, { color: '#e8a838', lineWidth: 1 });
        timedSetData(seriesB, dsData);
        chartB.timeScale().fitContent();
        // Also zoom to the view range for comparison
        requestAnimationFrame(() => {
          chartA.timeScale().setVisibleRange({ from: viewFrom, to: viewTo });
          chartB.timeScale().setVisibleRange({ from: viewFrom, to: viewTo });
        });

        const headCount = dsData.filter(p => p.time < viewFrom).length;
        const bodyCount = dsData.filter(p => p.time >= viewFrom && p.time <= viewTo).length;
        const tailCount = dsData.filter(p => p.time > viewTo).length;

        addLog(section,
          `Downsampled: ${dsData.length} total (head=${headCount}, body=${bodyCount}, tail=${tailCount})\n` +
          `Scaffold: ${wsData.length} whitespace points\n` +
          `Chart A: Head/tail points get equal bar spacing as body → distorted proportions\n` +
          `Chart B: Scaffold forces correct proportional time spacing`,
          'good'
        );
      }, 300);
    }

    // ========================================================================
    // EXPERIMENT 3: Interactive zoom with dynamic scaffold regeneration
    // ========================================================================
    {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = '<h2>3. Interactive: zoom in, scaffold regenerates</h2>' +
        '<p>Click zoom buttons to simulate zoom levels. Scaffold whitespace count scales with zoom. ' +
        'Watch the performance numbers — how high can we go before setData gets slow?</p>';
      root.appendChild(section);

      const controls = document.createElement('div');
      controls.className = 'controls';
      controls.innerHTML =
        '<label>Zoom to:</label>' +
        '<button data-days="69" class="active">Full (69d)</button>' +
        '<button data-days="30">30 days</button>' +
        '<button data-days="10">10 days</button>' +
        '<button data-days="3">3 days</button>' +
        '<button data-days="1">1 day</button>' +
        '<button data-days="0.25">6 hours</button>' +
        '<span style="margin-left:20px">Scaffold pts:</span>' +
        '<select id="ws-count">' +
        '<option value="1000">1,000</option>' +
        '<option value="2000">2,000</option>' +
        '<option value="5000" selected>5,000</option>' +
        '<option value="10000">10,000</option>' +
        '<option value="20000">20,000</option>' +
        '<option value="30000">30,000</option>' +
        '<option value="50000">50,000</option>' +
        '</select>' +
        '<span style="margin-left:20px">LTTB pts:</span>' +
        '<select id="lttb-count">' +
        '<option value="400">400</option>' +
        '<option value="800" selected>800</option>' +
        '<option value="1200">1,200</option>' +
        '<option value="2000">2,000</option>' +
        '</select>';
      section.appendChild(controls);

      const chartCont = document.createElement('div');
      chartCont.className = 'chart-container';
      chartCont.style.height = '350px';
      section.appendChild(chartCont);

      const perfLog = document.createElement('div');
      perfLog.id = 'perf-log-3';
      section.appendChild(perfLog);

      setTimeout(() => {
        const chart = makeChart(chartCont);
        window.__exp3chart = chart; // expose for debugging
        const scaffold = chart.addSeries(LineSeries, { visible: false });
        const dataSeries = chart.addSeries(LineSeries, { color: '#4ec9b0', lineWidth: 1 });

        function updateChart(zoomDays) {
          const wsCount = parseInt(document.getElementById('ws-count').value);
          const lttbCount = parseInt(document.getElementById('lttb-count').value);

          // Zoom center is at day 35 (middle of the dataset)
          const center = FULL_RANGE_START + 35 * 86400;
          const halfSpan = (zoomDays * 86400) / 2;
          const viewFrom = Math.max(FULL_RANGE_START, center - halfSpan);
          const viewTo = Math.min(DATA_END, center + halfSpan);

          let dsData;
          if (zoomDays >= 69) {
            // Full range — simple LTTB, no sparse head/tail
            dsData = lttbDownsample(BASE_DATA, lttbCount);
          } else {
            // Zoomed — simulate runChartDownsample with sparse head/tail
            dsData = simulateDownsample(BASE_DATA, viewFrom, viewTo, lttbCount);
          }

          const wsData = generateWhitespaceGrid(FULL_RANGE_START, DATA_END, wsCount);

          // Time both setData calls
          const t0 = performance.now();
          const tWs = timedSetData(scaffold, wsData);
          const tData = timedSetData(dataSeries, dsData);
          const tTotal = performance.now() - t0;

          // Zoom to the view using setVisibleLogicalRange (bar indices)
          // setVisibleRange with time values is unreliable, so find the
          // logical index range from the scaffold positions
          if (zoomDays < 69) {
            // Find the bar indices for our time range
            // The scaffold has wsCount evenly-spaced points across the full range
            const fullDur = DATA_END - FULL_RANGE_START;
            const fromFrac = (viewFrom - FULL_RANGE_START) / fullDur;
            const toFrac = (viewTo - FULL_RANGE_START) / fullDur;
            // Total unique bar positions ≈ wsCount + data points outside scaffold times
            // For simplicity, use scaffold indices as proxy
            const totalBars = wsCount + dsData.length;
            const fromIdx = Math.floor(fromFrac * totalBars);
            const toIdx = Math.ceil(toFrac * totalBars);
            chart.timeScale().setVisibleLogicalRange({
              from: fromIdx,
              to: toIdx,
            });
          } else {
            chart.timeScale().fitContent();
          }

          // Log performance
          perfLog.innerHTML = '';
          const level = tTotal < 100 ? 'good' : tTotal < 300 ? 'warn' : 'bad';
          const headCount = dsData.filter(p => p.time < viewFrom).length;
          const bodyCount = dsData.filter(p => p.time >= viewFrom && p.time <= viewTo).length;
          const tailCount = dsData.filter(p => p.time > viewTo).length;
          addLog(perfLog,
            `Zoom: ${zoomDays >= 1 ? zoomDays + ' days' : (zoomDays * 24) + ' hours'} | ` +
            `Data: ${dsData.length} pts [h=${headCount} b=${bodyCount} t=${tailCount}] (${tData.toFixed(1)}ms) | ` +
            `Scaffold: ${wsData.length} pts (${tWs.toFixed(1)}ms) | ` +
            `Total: ${tTotal.toFixed(1)}ms`,
            level
          );
        }

        // Wire up buttons
        controls.querySelectorAll('button[data-days]').forEach(btn => {
          btn.addEventListener('click', () => {
            controls.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateChart(parseFloat(btn.dataset.days));
          });
        });

        document.getElementById('ws-count').addEventListener('change', () => {
          const activeBtn = controls.querySelector('button.active');
          updateChart(parseFloat(activeBtn.dataset.days));
        });

        document.getElementById('lttb-count').addEventListener('change', () => {
          const activeBtn = controls.querySelector('button.active');
          updateChart(parseFloat(activeBtn.dataset.days));
        });

        // Initial render
        updateChart(69);
      }, 500);
    }

    // ========================================================================
    // EXPERIMENT 4: setData performance benchmark
    // ========================================================================
    {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = '<h2>4. setData() performance benchmark</h2>' +
        '<p>Measures setData() timing for whitespace-only series at various point counts. ' +
        'Each count is tested 5 times. This tells us the practical ceiling.</p>';
      root.appendChild(section);

      const btnRun = document.createElement('button');
      btnRun.textContent = 'Run Benchmark';
      btnRun.style.cssText = 'background:#264f78; color:#d4d4d4; border:1px solid #4ec9b0; padding:8px 16px; cursor:pointer; font-family:monospace; font-size:14px;';
      section.appendChild(btnRun);

      const benchCont = document.createElement('div');
      benchCont.className = 'chart-container';
      benchCont.style.height = '100px';
      benchCont.style.visibility = 'hidden';
      section.appendChild(benchCont);

      const benchResults = document.createElement('div');
      section.appendChild(benchResults);

      btnRun.addEventListener('click', async () => {
        btnRun.disabled = true;
        btnRun.textContent = 'Running...';
        benchResults.innerHTML = '';

        const counts = [1000, 2000, 5000, 10000, 20000, 30000, 50000, 75000, 100000];
        const table = document.createElement('table');
        table.className = 'perf-table';
        table.innerHTML = '<tr><th>Points</th><th>Run 1</th><th>Run 2</th><th>Run 3</th><th>Run 4</th><th>Run 5</th><th>Avg</th><th>Verdict</th></tr>';
        benchResults.appendChild(table);

        for (const count of counts) {
          const chart = makeChart(benchCont);
          const series = chart.addSeries(LineSeries, { visible: false });
          const wsData = generateWhitespaceGrid(FULL_RANGE_START, DATA_END, count);

          const times = [];
          for (let i = 0; i < 5; i++) {
            // Force a clear/reset between runs
            series.setData([]);
            await new Promise(r => setTimeout(r, 10));
            const elapsed = timedSetData(series, wsData);
            times.push(elapsed);
          }

          chart.remove();

          const avg = times.reduce((a, b) => a + b) / times.length;
          const verdict = avg < 50 ? 'fast' : avg < 200 ? 'ok' : avg < 500 ? 'slow' : 'too slow';
          const color = avg < 50 ? '#4ec9b0' : avg < 200 ? '#e8a838' : '#f44';

          const row = document.createElement('tr');
          row.innerHTML =
            `<td>${count.toLocaleString()}</td>` +
            times.map(t => `<td>${t.toFixed(1)}ms</td>`).join('') +
            `<td style="color:${color}; font-weight:bold">${avg.toFixed(1)}ms</td>` +
            `<td style="color:${color}">${verdict}</td>`;
          table.appendChild(row);

          // Let the UI breathe
          await new Promise(r => setTimeout(r, 50));
        }

        btnRun.textContent = 'Run Again';
        btnRun.disabled = false;
      });
    }

    // ========================================================================
    // EXPERIMENT 5: Scroll/pan behavior at edges with whitespace
    // ========================================================================
    {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = '<h2>5. Edge scroll behavior with whitespace scaffold</h2>' +
        '<p>Tests whether whitespace at the edges allows free panning. ' +
        'Try scrolling/panning left and right on the chart below. ' +
        'The scaffold extends 10% beyond the data range on each side.</p>';
      root.appendChild(section);

      const chartCont = document.createElement('div');
      chartCont.className = 'chart-container';
      section.appendChild(chartCont);

      setTimeout(() => {
        const chart = makeChart(chartCont);
        const scaffold = chart.addSeries(LineSeries, { visible: false });

        // Extend scaffold 10% beyond data range on each side
        const padding = (DATA_END - FULL_RANGE_START) * 0.1;
        const wsData = generateWhitespaceGrid(
          FULL_RANGE_START - padding,
          DATA_END + padding,
          5000
        );
        timedSetData(scaffold, wsData);

        const dataSeries = chart.addSeries(LineSeries, { color: '#9cdcfe', lineWidth: 1 });
        const dsData = lttbDownsample(BASE_DATA, 1000);
        timedSetData(dataSeries, dsData);
        chart.timeScale().fitContent();

        addLog(section,
          `Data range: ${new Date(FULL_RANGE_START * 1000).toISOString().slice(0,10)} to ${new Date(DATA_END * 1000).toISOString().slice(0,10)}\n` +
          `Scaffold extends 10% beyond each edge (${Math.round(padding / 86400)} days of padding)\n` +
          `Try panning left/right — can you scroll into the padded whitespace zone?`,
          'good'
        );
      }, 700);
    }

    // ========================================================================
    // EXPERIMENT 6: Multi-series with shared scaffold
    // ========================================================================
    {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = '<h2>6. Multi-series sharing one scaffold</h2>' +
        '<p>Two visible data series + one hidden whitespace scaffold. ' +
        'Verifies the scaffold works for multiple series simultaneously.</p>';
      root.appendChild(section);

      const chartCont = document.createElement('div');
      chartCont.className = 'chart-container';
      section.appendChild(chartCont);

      setTimeout(() => {
        const chart = makeChart(chartCont);
        const scaffold = chart.addSeries(LineSeries, { visible: false });
        const wsData = generateWhitespaceGrid(FULL_RANGE_START, DATA_END, 3000);
        timedSetData(scaffold, wsData);

        // Two different data series with different zoom ranges simulated
        const data1 = generateFullResData(FULL_RANGE_START, DATA_END, 3600); // hourly
        const data2 = data1.map(p => ({ time: p.time, value: p.value * 1.5 + 20 }));

        const ds1 = lttbDownsample(data1, 600);
        const ds2 = lttbDownsample(data2, 600);

        const series1 = chart.addSeries(LineSeries, { color: '#4ec9b0', lineWidth: 1, title: 'Price A' });
        const series2 = chart.addSeries(LineSeries, { color: '#e8a838', lineWidth: 1, title: 'Price B' });
        timedSetData(series1, ds1);
        timedSetData(series2, ds2);
        chart.timeScale().fitContent();

        addLog(section,
          `Series 1: ${ds1.length} pts (green)\nSeries 2: ${ds2.length} pts (orange)\n` +
          `Scaffold: ${wsData.length} whitespace pts (shared)\n` +
          `Both series should be proportionally spaced on the same time axis.`,
          'good'
        );
      }, 900);
    }

    // ========================================================================
    // EXPERIMENT 7: Rapid setData updates (simulating ticking + zoom)
    // ========================================================================
    {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = '<h2>7. Rapid setData updates (tick + zoom simulation)</h2>' +
        '<p>Simulates receiving new downsampled data every 500ms (as if ticking) ' +
        'while scaffold updates every 2s. Measures frame jank.</p>';
      root.appendChild(section);

      const controls = document.createElement('div');
      controls.className = 'controls';
      const btnStart = document.createElement('button');
      btnStart.textContent = 'Start Ticking';
      const btnStop = document.createElement('button');
      btnStop.textContent = 'Stop';
      btnStop.disabled = true;
      const wsSelect = document.createElement('select');
      wsSelect.innerHTML =
        '<option value="5000" selected>5K scaffold</option>' +
        '<option value="10000">10K scaffold</option>' +
        '<option value="20000">20K scaffold</option>' +
        '<option value="30000">30K scaffold</option>';
      controls.appendChild(btnStart);
      controls.appendChild(btnStop);
      controls.appendChild(document.createTextNode(' Scaffold size: '));
      controls.appendChild(wsSelect);
      section.appendChild(controls);

      const chartCont = document.createElement('div');
      chartCont.className = 'chart-container';
      section.appendChild(chartCont);

      const tickLog = document.createElement('div');
      tickLog.style.cssText = 'max-height:150px; overflow-y:auto;';
      section.appendChild(tickLog);

      setTimeout(() => {
        const chart = makeChart(chartCont);
        const scaffold = chart.addSeries(LineSeries, { visible: false });
        const dataSeries = chart.addSeries(LineSeries, { color: '#4ec9b0', lineWidth: 1 });

        // Initial data
        let currentEnd = FULL_RANGE_START + 30 * 86400;
        let dsData = lttbDownsample(
          BASE_DATA.filter(p => p.time <= currentEnd),
          800
        );
        let wsData = generateWhitespaceGrid(FULL_RANGE_START, currentEnd, 5000);
        scaffold.setData(wsData);
        dataSeries.setData(dsData);
        chart.timeScale().fitContent();

        let tickInterval = null;
        let scaffoldInterval = null;
        let tickCount = 0;

        btnStart.addEventListener('click', () => {
          btnStart.disabled = true;
          btnStop.disabled = false;
          tickLog.innerHTML = '';
          tickCount = 0;

          // Data ticks every 500ms — extend the range slightly and re-downsample
          tickInterval = setInterval(() => {
            tickCount++;
            currentEnd += 3600; // add 1 hour of data
            if (currentEnd > DATA_END) currentEnd = DATA_END;

            const visibleData = BASE_DATA.filter(p => p.time <= currentEnd);
            dsData = lttbDownsample(visibleData, 800);

            const t = timedSetData(dataSeries, dsData);
            if (tickCount % 4 === 0) {
              addLog(tickLog,
                `Tick ${tickCount}: ${dsData.length} pts, setData: ${t.toFixed(1)}ms`,
                t < 50 ? 'good' : 'warn'
              );
            }
          }, 500);

          // Scaffold updates every 2s
          scaffoldInterval = setInterval(() => {
            const wsCount = parseInt(wsSelect.value);
            wsData = generateWhitespaceGrid(FULL_RANGE_START, currentEnd, wsCount);
            const t = timedSetData(scaffold, wsData);
            addLog(tickLog,
              `  Scaffold update: ${wsData.length} pts, setData: ${t.toFixed(1)}ms`,
              t < 100 ? 'good' : 'warn'
            );
          }, 2000);
        });

        btnStop.addEventListener('click', () => {
          clearInterval(tickInterval);
          clearInterval(scaffoldInterval);
          btnStart.disabled = false;
          btnStop.disabled = true;
          addLog(tickLog, `Stopped after ${tickCount} ticks`, 'good');
        });
      }, 1100);
    }

  </script>
</body>
